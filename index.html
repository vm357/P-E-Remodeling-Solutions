    function useReveal() {

        const io = new IntersectionObserver((entries) => {

        els.forEach((el) => {

        const t = setTimeout(() => { above.forEach((el) => el.classList.add('in')); }, 40);
        return () => { io.disconnect(); clearTimeout(t); };
      });
    }
